<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Form: Step 5 - PUREPRINT Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/cumla_style.css"/>
  <link rel="stylesheet" href="css/cumla_page3.css"/>
</head>

<body>
  <header>
    <a href="../../RODRIGUEZ III/home_page.html"><button class="bi bi-house btn btn-primary" id="HomeBtn"> Home</button></a>
    <h1>PUREPRINT Website</h1>
  </header>

    <main>
        <section style="text-align: center; padding: 8px;">
            <h1>STEP 5: Select Schedule</h1>
            <p>Select your preferred option:</p>
            </section>

    <div>
        <div class="schedule-buttons">
        <button class="schedule-btn" id="pickupBtn">Pick-up</button>
        <button class="schedule-btn" id="deliveryBtn">Delivery</button>
        </div>
    </div>

    <div class="btn-container">
      <button id="backBtn">Back</button>
    </div>  
    </main>

    <script>
      document.getElementById('pickupBtn').onclick = function() {
        localStorage.setItem('orderSchedule', 'Pick-up');
        window.location.href = '../../GRUYAL/Pickup_Page.html';
      };

      document.getElementById('deliveryBtn').onclick = function() {
        localStorage.setItem('orderSchedule', 'Delivery');
        window.location.href = '../../GRUYAL/Delivery_Page.html';
      };

        // back
        document.getElementById('backBtn').onclick = () => {
          window.history.back();
        };
    </script>


  <footer class="page-footer"></footer>

</body>
</html>
