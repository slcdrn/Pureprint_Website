    <div class="justify-center">
        <div class="feedback-container">
        <div class="average-rating-header">
            <h2>Average Rating</h2>
        <div class="rating-display" style="padding: 0px">
            <table style="width: 75%">
                <tr>
                    <td>
                        <span class="bi bi-star-fill" style="color: #0C1E42; font-size: 24px;"></span>
                        <span class="bi bi-star-fill" style="color: #0C1E42; font-size: 24px;"></span>

                        <span class="average-score">4.7</span>
                    </td>
                </tr>
            </table>
        </div>
            <hr class="header-separator">
        <div class="controls-bar">
            <div class="control-group">
                <label for="sort-by" class="control-label">Sort by:</label>
                <select id="sort-by" class="control-select">
                    <option value="recent">Most Recent</option>
                    <option value="oldest">Oldest</option>
                    <option value="highest-rating">Highest Rating</option>
                </select>
            </div>
           
            <div class="control-group">
                <label for="filter-by" class="control-label">Filter by:</label>
