<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PurePrint — Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
  *{box-sizing:border-box;font-family:"Montserrat",system-ui,Arial,Helvetica,sans-serif}
  
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
  }

  
 .wrap{
  display:flex;
  align-items:center;
  gap:60px;
  margin-left:250px; 
}


  .logo-box img{
    width:260px;   
    height:auto;
    display:block;
  }

  
  .box{
    background:#fff;
    padding:55px 45px;      
    width:375px;            
    border-radius:22px;     
    border:3px solid #0d1525;
    box-shadow:none;
  }

  h1{
    margin:0 0 28px 0;
    text-align:center;
    color:#0d1525;
    font-size:30px;           
    font-weight:700;
  }

  label{
    font-size:16px;           
    color:#0d1525;
    font-weight:600;
    display:block;
    margin-top:10px;
  }

  input{
    width:100%;
    height:42px;            
    padding:6px 10px;
    border-radius:6px;
    border:1.8px solid #0d1525;
    margin-top:6px;
    margin-bottom:20px;
    font-size:15px;           
  }

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:10px;
  }

  .btn{
    background:#1877F2;
    color:#fff;
    border:none;
    height:42px;              
    border-radius:8px;
    padding:0 18px;
    cursor:pointer;
    font-weight:700;
    font-size:16px;
  }

  a{
    color:#0d1525;
    text-decoration:none;
    font-weight:600;
    font-size:15px;
  }

  
  .social{
    display:flex;
    gap:6px;
    margin-top:20px;
  }

  .social button{
    flex:1;
    height:42px;
    border-radius:8px;
    border:1.8px solid #0d1525;
    background:#fff;
    cursor:pointer;
    font-weight:600;
    font-size:15px;
  }
</style>


</head>
<body>

  <div class="wrap">
    <div class="logo-box">
      <img src="logo.PNG" alt="PurePrint Logo">
    </div>
    <div class="box" role="main">
      <h1>Log In</h1>

      <label for="who">Email or Username</label>
      <input id="who" type="text" placeholder="email or username" autocomplete="username">

      <label for="pass">Password</label>
      <input id="pass" type="password" placeholder="password" autocomplete="current-password">

      <div style="display:flex;align-items:center;gap:4px;margin-bottom:12px">
        <input id="remember" type="checkbox" style="transform:scale(0.8)">
        <label for="remember" style="margin:0;font-size:13px">Remember me</label>
      </div>

      <div class="row">
        <button class="btn" id="loginBtn">Log In</button>
        <a href="SignUp_Fixed.html">Create account</a>
      </div>

      <div class="social">
        <button id="gLogin">Google</button>
        <button id="fLogin">Facebook</button>
      </div>

      <div style="margin-top:10px;color:#6b7280;font-size:13px">Tip: use the account you created on Sign Up.</div>
    </div>
  </div>

<script>
function getAccounts(){ try { return JSON.parse(localStorage.getItem('pp_accounts')||'[]'); } catch(e){ return []; } }

function checkAlreadyLoggedIn(){
  const u = localStorage.getItem('pp_loggedInUser') || sessionStorage.getItem('pp_loggedInUser');
  if(u){
    window.location.href = '../index.html';
    return true;
  }
  return false;
}

if(checkAlreadyLoggedIn()){}

document.getElementById('loginBtn').addEventListener('click', function(){
  const who = document.getElementById('who').value.trim();
  const pass = document.getElementById('pass').value;
  const remember = document.getElementById('remember').checked;

  if(!who || !pass) return alert('Please enter credentials.');

  const accounts = getAccounts();
  const found = accounts.find(a => (a.username.toLowerCase() === who.toLowerCase() || a.email.toLowerCase() === who.toLowerCase()) && a.password === pass);

  if(!found){
    return alert('Invalid login — please check username/email and password.');
  }

  if(remember){
    localStorage.setItem('pp_loggedInUser', found.username);
  } else {
    sessionStorage.setItem('pp_loggedInUser', found.username);
  }

  window.location.href = '../index.html';
});

function simulateSocialLogin(provider){
  const email = prompt(`Simulate ${provider} sign-in. Enter the ${provider} email:`);
  if(!email) return;
  const accounts = getAccounts();
  let found = accounts.find(a => a.email.toLowerCase() === email.toLowerCase());
  if(!found){
    const base = email.split('@')[0].replace(/[^a-z0-9]/gi,'').slice(0,12) || provider + 'user';
    let username = base; let i=1;
    while(accounts.some(a => a.username.toLowerCase() === username.toLowerCase())){
      username = base + i; i++;
    }
    found = { email, username, password: Math.random().toString(36).slice(2,10), provider };
    accounts.push(found);
    localStorage.setItem('pp_accounts', JSON.stringify(accounts));
    alert('Created a simulated account for ' + provider + '.');
  }
  localStorage.setItem('pp_loggedInUser', found.username);
  window.location.href = '../index.html';
}

document.getElementById('gLogin').addEventListener('click', ()=> simulateSocialLogin('Google'));
document.getElementById('fLogin').addEventListener('click', ()=> simulateSocialLogin('Facebook'));
</script>
</body>
</html>
