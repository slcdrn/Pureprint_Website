<!DOCTYPE html>

<style>
    body{
        margin: 0;
        background: #f7f9fc;
        font-family: 'Trebuchet MS';
        text-align: center;
    }

   
    .header_container{
        background: #0c1e42;
        padding: 20px;
        display: flex;
        align-items: center;
        box-shadow: 0px 0px 20px 0px gray;
        color: white;
    }

    .home-btn{
      background-color:white;
            border: none;
            color: #0177b4;
            font-family: 'Trebuchet MS';
            letter-spacing: 1px;
            border-radius: 100px;
            padding: 10px;
            margin: 10px;
            font-size: 10px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            text-decoration: none;
    }

    .home-btn:hover{
        background-color: #0177b4;
        color: white;
        transition: 0.4s;
    }

    .bold-title{
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 2px;
        color: white;
    }


    .box{
        width: 450px;
        padding: 30px 20px;
        text-align: center;
        border: 1px solid #000000;
        border-radius: 50px;
        margin: 40px auto;
        margin-top: 30px;
        background: white;
        box-shadow: 0px 0px 20px 0px gray;

    }

    .title{
        font-size: 40px;
        font-weight: bold;
        letter-spacing: 1px;
        margin-bottom: 20px;
        text-decoration: underline;
        color: #0c1e42;
    }

    .status-text{
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 15px;
        color: #1dbf73;
    }

    .label{
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .complete-box{
        background: #1dbf73;
        color: white;
        padding: 12px 30px;
        border-radius: 20px;
        display: inline-block;
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    
    .button-pink{
        background-color: #d61278;
        color:white;
        border:none;
        padding: 20px 30px;
        border-radius: 50px;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
        display: block;
        width: 70%;
        margin: 15px auto;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
    }

    .button-pink:hover{
        background-color: #0c1e42;
        color: #ffffff;
        border: 2px solid #0177b4;
        transition: 0.4s;
    }

    .button-blue{
        background-color: #0177b4;
        color:white;
        border:none;
        padding: 20px 30px;
        border-radius: 50px;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
        display: block;
        width: 70%;
        margin: 15px auto;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
    }

    .button-blue:hover{
        background-color: #d61278;
        color: white;
        border: 2px solid #0177b4;
        transition: 0.4s;
    }

    footer{
        background-color: #0c1e42;
        padding: 20px;
        width: 100%;
        bottom: 0;
        position: fixed;
        box-shadow: 0px -5px 20px 0px gray;
    }
</style>

 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<div class="header_container">

</div>

    <div class="status-text">Order Completed</div>

    <div class="label">Order Status:</div>

    <p style="font-size: 22px;">Thank you for choosing PurePrint!</p>

    <a href="../RODRIGUEZ III/feedback.html" class="button-pink">Leave Feedback</a>
